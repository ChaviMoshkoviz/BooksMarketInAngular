<!-- התפריט כעת נמצא כאן, לכן הוא יופיע בכל דף -->
<header class="navbar">
  <div class="nav-item" routerLink="/">דף בית</div>
  <div class="nav-item" routerLink="/categories">קטגוריות</div>
  <div class="nav-item">פרסום מסירה/מכירה</div>
  <div class="nav-item">חיפוש</div>
  <div class="nav-item" (click)="openLogin()">התחברות/הרשמה</div>
</header>


<!-- כאן אנגולר יטען את הקומפוננטה המתאימה לפי הנתיב (בית או קטגוריות) -->
<router-outlet></router-outlet>

<!-- החלונית (Modal) - נמצאת כאן כדי שתוכל להופיע מעל כל דף -->
<div class="modal-overlay" *ngIf="showLoginModal">
  <div class="modal-content">
    <button class="close-btn" (click)="closeModal()">X</button>
    <app-login (loginSuccess)="closeModal()"></app-login>
    <p class="skip-text" (click)="closeModal()">אני ארשם אחר כך</p>
  </div>
</div>
